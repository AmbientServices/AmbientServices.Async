name: Build and Test

on:
  push:
    branches: [ master ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
    - name: Setup .NET 8.0
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.0.x
    - name: Setup .NET 9.0
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 9.0.x
    - name: Setup .NET 10.0
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Install dotnet-set-version
      run: dotnet tool install --global dotnet-set-version
    - name: Run dotnet-set-version
      run: dotnet-set-version 0.1.${{ github.run_number }} -NoPackageOutputPath
    - name: Install dotnet-markdown-sample-code
      run: dotnet tool install --global dotnet-markdown-sample-code
    - name: Install dotnet-coverage
      run: dotnet tool install --global dotnet-coverage
    - name: Build AmbientServices.Async
      run: dotnet build AmbientServices.Async -c Release
    - name: Build AmbientServices.Async.Samples
      run: dotnet build AmbientServices.Async.Samples -c Release
    - name: Build AmbientServices.Async.Test
      run: dotnet build AmbientServices.Async.Test -c Release
    - name: Test .NET 10 with Microsoft code coverage
      run: dotnet test -c Release -f net10.0 --collect:"Code Coverage" --settings codecoverage.runsettings --logger:"trx;LogFileName=unit.testresults.trx" --blame-hang-timeout 120s
    - name: Merge coverage to Cobertura (ReportGenerator)
      run: dotnet-coverage merge "**/TestResults/**/*.coverage" -f cobertura -o coverage.cobertura.xml
    - name: ReportGenerator
      uses: danielpalme/ReportGenerator-GitHub-Action@5.5.10
      with:
        reports: 'coverage.cobertura.xml'
        targetdir: 'coveragereport'
        reporttypes: 'HtmlInline;Badges'
        sourcedirs: ''
        historydir: ''
        plugins: ''
        assemblyfilters: '+*'
        classfilters: '+*'
        filefilters: '+*'
        verbosity: 'Info'
        title: ''
        tag: '${{ github.run_number }}_${{ github.run_id }}'
        license: ''
        customSettings: ''
        toolpath: 'reportgeneratortool'
    - name: Stage coverage badge for NuGet package readme
      run: |
        mkdir -p docs
        PERCENT=$(grep -oE '[0-9]+(\.[0-9]+)?%' coveragereport/badge_shieldsio_linecoverage_green.svg | head -1)
        test -n "$PERCENT" || (echo "Could not read line coverage percent from ReportGenerator output." && exit 1)
        sed "s|__PERCENT__|${PERCENT}|g" docs/line-coverage.template.svg > docs/line-coverage.svg
    - name: Commit coverage badge to repo
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add docs/line-coverage.svg
        if git diff --staged --quiet; then
          echo "Line coverage badge unchanged."
        else
          git commit -m "Update docs/line-coverage.svg [skip ci]"
          BRANCH="${{ github.ref_name }}"
          for attempt in 1 2 3 4 5 6; do
            if git pull --rebase --autostash origin "$BRANCH" && git push origin "HEAD:${BRANCH}"; then
              exit 0
            fi
            echo "Pull/push failed (attempt ${attempt}); retrying after backoff..."
            sleep $((attempt * 3))
          done
          echo "Could not push badge update after retries."
          exit 1
        fi
    - name: Pack NuGet (readme embeds docs/line-coverage.svg)
      run: dotnet pack AmbientServices.Async -c Release
    - name: Upload coverage report artifact
      uses: actions/upload-artifact@v7
      with:
        name: CoverageReport
        path: coveragereport
    - name: Test .NET 9.0
      run: dotnet test -c Release -f net9.0 --blame-hang-timeout 120s
    # Exchange the GitHub OIDC token for a short-lived NuGet API key (valid 1 hour); must run shortly before the push.
    - name: NuGet login (OIDC -> temporary API key)
      uses: NuGet/login@v1
      id: nuget-login
      with:
        user: ${{ secrets.NUGET_USER }}  # nuget.org profile/username (NOT email); must match the Trusted Publishing policy owner
    - name: Publish
      run: dotnet nuget push AmbientServices.Async/bin/Release/AmbientServices.Async.0.1.${{ github.run_number }}.nupkg -k ${{ steps.nuget-login.outputs.NUGET_API_KEY }} -s https://api.nuget.org/v3/index.json

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Download coverage report
      uses: actions/download-artifact@v8
      with:
        name: CoverageReport
        path: coveragereport
    - name: Configure GitHub Pages
      uses: actions/configure-pages@v6
    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v5
      with:
        path: coveragereport
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5
